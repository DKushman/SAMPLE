    - generic [ref=e54]:
      - generic [ref=e55]:
        - text: Die neue Zentral- und Landesbibliothek Berlin soll das soziale und kulturelle Zentrum des zukünftigen Stadtquartieres im Randbereich des ehemaligen Flugfeldes des Flughafens Tempelhof bilden. Der Entwurfsansatz zeigt ein Gebäude, das einerseits als urbane Landmarke dient und andererseits hohe Aufenthaltsqualitäten mit einer langfristig funktionierenden, hocheffizienten und an vielfältige Nutzerbedürfnisse anpassbaren räumlichen Organisation verbindet. So ist die Bibliothek als ein einfach begreifbares aber komplexes Gebäude mit einer starken äußeren Form und einer hohen Anzahl an unterschiedlichen Innenräumen konzipiert.
        - text: Der rechteckige Grundriss wird durch einen Ring aus vertikalen Serviceeinheiten und Erschließungen gegliedert. Dazwischen spannt sich geschossweise ein riesiges Feld auf, das hochflexibel ist und mit unterschiedlichsten Programmen bespielt werden kann. Die großzügig verglaste Fassade bietet beeindruckende Blicke auf die sich weit erstreckende Parkfläche des ehemaligen Flugfeldes.
