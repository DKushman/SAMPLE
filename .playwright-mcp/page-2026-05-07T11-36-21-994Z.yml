          - generic [ref=e54]:
            - heading "VERLEIHUNG DES BAUWERKE EXZELLENZ-PREISES 2024 IN BERLIN" [level=1] [ref=e56]
            - generic [ref=e57]:
              - paragraph [ref=e58]:
                - text: Am 4. Dezember wurde der BauWerke Exzellenz-Preis für die Absolventen des Fachbereichs Architektur an der
                - link "Hochschule für Technik und Wirtschaft Berlin (BHT)" [ref=e59] [cursor=pointer]:
                  - /url: https://www.bht-berlin.de/
                - text: mit den besten Bachelorarbeiten des Jahrgangs 2023/2024 in feierlichem Rahmen verliehen. Seit 2019 werden mit diesem Förderpreis jedes Jahr Nachwuchstalente für ihre außergewöhnlichen Leistungen geehrt.
              - paragraph [ref=e60]: Die prämierten Arbeiten zeichnen sich durch herausragende gestalterische Qualität, technisch-konstruktive Durcharbeitung sowie Darstellung und Präsentation aus.
              - paragraph [ref=e61]:
                - text: Die Verleihung der Auszeichnungen an die diesjährigen Preisträger durch die Geschäftsführung der BauWerke GmbH, die Vorstände der
                - link "Fördergemeinschaft Bauwesen e.V." [ref=e62] [cursor=pointer]:
                  - /url: https://www.foerdergemeinschaft-bauwesen.de/
                - text: und des
                - link "Bundes Deutscher Baumeister, Architekten und Ingenieure e.V. (BDB)" [ref=e63] [cursor=pointer]:
                  - /url: https://www.baumeister-online.de/
                - text: erfolgte vor geladenem Fachpublikum in der Villa des BDB in Berlin.
              - paragraph [ref=e64]: Wir gratulieren herzlich!
              - paragraph [ref=e65]: "Fotoquelle: Fördergemeinschaft Bauwesen e.V."
