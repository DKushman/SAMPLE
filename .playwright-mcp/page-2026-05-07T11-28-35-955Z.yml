          - heading "Landesvertretung Bayern, Berlin" [level=1] [ref=e52]
          - paragraph [ref=e54]: Für die Bayerische Landesvertretung in Berlin hat BauWerke die Besprechungs-, Konferenz- und Versammlungsräume sowie ausgewählte Büros neu gestaltet. Der sanierte Altbau mit seiner Beständigkeit, Solidität und Großzügigkeit ist gleichzeitig zweckmäßig und zeitgemäß organisiert. Er dient aktuellen und anspruchsvollen politischen, wirtschaftlichen und kulturellen Zwecken. Die Innenraumgestaltung soll diesen Charakterzügen Rechnung tragen.
