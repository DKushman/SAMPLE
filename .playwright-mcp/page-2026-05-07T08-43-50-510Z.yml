      - generic [ref=e56]:
        - text: Ort der Begegnung – Palast der Demokratie
        - text: Das Rathaus der Zukunft ist ein Ort der Begegnung. Seine offene Struktur führt die Öffentlichkeit durch das Gebäude vom Erdgeschoss bis an seine Spitze. Das Rathaus erweitert den öffentlichen Raum in der Vertikalen und schafft ein neues Wohnzimmer und einen vertikalen Park für die Einwohner des Bezirks. Die Begegnung mit der Verwaltung findet auf offenen Plattformen statt. Die Verwaltung der Zukunft ist digital oder transparent, persönlich und direkt.
        - text: Das Rathaus der Zukunft ist ein sicherer Schutzraum, ein Grünraum, ein Erholungsraum, ein Ort der Anstöße und ein Ort der demokratischen Traditionen.
        - text: Das Rathaus der Zukunft ist ein Palast der Demokratie. Der Plenarsaal der Bezirksverordnetenversammlung ist das Herz des Gebäudes. Das durchgehende Atrium ermöglicht der Öffentlichkeit jederzeit den Einblick auf das Handeln der gewählten Volksvertretung sowie in die Arbeit der Verwaltung.
