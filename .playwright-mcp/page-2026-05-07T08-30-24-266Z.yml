      - generic [ref=e56]:
        - text: Das Grundstück Prinzregentenstraße 69-70 befindet sich im Berliner Bezirk Charlottenburg- Wilmersdorf. Vor dem 2. Weltkrieg war es im Besitz der Jüdischen Gemeinde von Berlin. Zwischen den Jahren 1928 und 1930 wurde nach den Plänen Beers eine Synagoge in Form eines zentralen Kuppelbaus errichtet. Nach der Machtergreifung der Nationalsozialisten wurde ab 1933 das Leben jüdischer Bürgerinnen und Bürger zunehmend eingeschränkt, die mit den Novemberprogromen von 1938 zur Zerstörung der Synagoge führte.
        - text: 1955, 10 Jahre nach dem Sieg über Nazi-Deutschland, erreichte die Jewish Trust Corporation unter erheblichen Anstrengungen die Rückerstattung des Grundstücks von der Stadt Berlin. Im Rahmen eines Vertrags wurde dann das Grundstück an die Stadt Berlin übertragen.
        - text: Die Stadt Berlin überließ nach 1958 das zwischenzeitlich vollständig beräumte Gelände dem Allgemeinen Blindenverein Berlin, der ab 1959 dort ein mehrgeschossiges Wohngebäude mit insgesamt 70 Wohneinheiten für sehbehinderte Menschen errichten ließ.
        - text: Eine am 9. November 1988 enthüllte Gedenktafel erinnert an die ehemalige Synagoge Prinzregentenstraße.
        - text: Das geplante Wohnhaus wird in 2. Reihe hinter dem 1959 fertiggestellten Wohnhaus errichtet. Hinsichtlich der Höhe und Geschosszahl orientiert sich das neue Wohnhaus an der vorhandenen Bebauung. Es umfasst insgesamt 48 Wohnungen mit einem integrierten Gemeinschaftsraum und einem Fahrradraum, der im Untergeschoss angeordnet wird. Der kompakte Baukörper mit einem doppelgeschossigen Staffelgeschoss verläuft in seiner Längsachse von Norden nach Süden. Die Wohnungen sind entsprechend nach Osten und Westen ausgerichtet. Der zentrale Mittelgang erschließt in der Regel 8 Wohneinheiten je Geschoss. Der Zugang erfolgt über einen nach Nord-Westen ausgerichteten Haupteingang, der über den Mittelgang an die beiden notwendigen Treppenhäuser und die zentrale Aufzugsanlage angebunden ist.
        - text: Die Bezüge zur jüdischen Synagoge sollen durch einen Erinnerungspfad im Außenbereich des Baugrundstücks hergestellt werden.
        - text: Auch formale Bezüge zur ehemaligen Synagoge werden in der vorhandenen Freiraumplanung hinsichtlich der Wegeführung in das neue Freianlagenkonzept integriert.
        - text: Im Rahmen der Berliner Förderkulisse entstehen mietpreisgebundene Wohnungen. Die Anforderungen an die Gestaltungsvorgaben von seheingeschränkten Menschen werden bei der Planung berücksichtigt. Das geplante Gebäude erfüllt darüber hinaus die Vorgaben „klimafreundliches Wohngebäude - mit QNG (QNG PLUS)“. Der Hofgarten erfüllt die Anforderungen an Biodiversität und naturnahem Grün über die Erfüllung der Vorgaben aus dem festgesetzten Landschaftsplan.
