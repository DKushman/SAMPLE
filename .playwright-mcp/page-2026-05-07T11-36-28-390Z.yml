            - generic [ref=e57]:
              - paragraph [ref=e58]: "Die „Kalkscheune“ – einstige Kultstätte der Berliner Kunst- und Veranstaltungsszene in Berlin-Mitte – wird wiederbelebt:"
              - paragraph [ref=e59]:
                - text: Das leerstehende denkmalgeschützte Ensemble im Herzen der Stadt wird u.a. neuer Firmensitz der Firma
                - link "Georg Neumann" [ref=e60] [cursor=pointer]:
                  - /url: https://www.neumann.com/de-de/
                - text: ", Weltmarktführer im Bereich hochwertiger Audiotechnik."
              - paragraph [ref=e61]: Die Gebäude werden sämtlich energetisch und technisch auf den neuesten Stand gebracht, neugestaltet und denkmalgerecht erweitert. Ästhetik und Flächenlayout spiegeln Kultur und Bedürfnisse hochinnovativer Unternehmen wider.
              - paragraph [ref=e62]: BauWerke wurde mit der Generalplanung sowie Leistungen der Projektsteuerung beauftragt (sämtliche Entwurfs-, Planungs- und Überwachungsleistungen, Sonderfachplanungen und Gutachten); die Fertigstellung erfolgt im Jahr 2027.
