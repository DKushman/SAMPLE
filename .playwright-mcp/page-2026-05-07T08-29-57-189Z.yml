  - generic [ref=e39]:
    - heading "Wohnhaus Boyenstraße in Berlin-Mitte" [level=2] [ref=e40]
    - generic [ref=e41]:
      - generic [ref=e42]:
        - text: Das geplante mehrgeschossige Wohnhaus liegt in räumlicher Nähe zum Erika-Heß-Eisstadion in Berlin-Mitte, östlich des Nordhafens und westlich der Chausseestraße.
        - text: Das 7-geschossige Gebäude fügt sich harmonisch in die bestehende Blockrandbebauung ein, die durch moderne und architektonisch vielfältige Wohnhäuser geprägt ist. Die Fassaden jeweils zur Straßen- und Hofseite geben durch großzügig ausgebildete Fensterverglasungen den Blick über das Eisstadion und den Nordhafen frei.
        - text: Die kompakten Wohneinheiten erzeugen ihre großzügige Wirkung durch diesen Außenbezug, deren Raumangebot durch wechselnd angeordnete Balkone und Erker erweitert wird.
        - text: Das Innere des Gebäudes verfolgt ein Gestaltungskonzept des veredelten Rohbaus, das bewusst auf Putzoberflächen oder Verschalungen verzichtet. Hier prägen Struktur, Rhythmus und Dimension der tragenden Bauteile wie Stützen, Balken und Wände die Wohnräume.
